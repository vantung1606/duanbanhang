services:
  # Backend Service (Spring Boot)
  - type: web
    name: duanbanhang-backend
    env: java
    region: singapore
    plan: free
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: duanbanhang-db
          property: connectionString

  # Frontend Service (Static Site)
  - type: web
    name: duanbanhang-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    customDomains:
      - duongdiyshop.com
      - www.duongdiyshop.com
    envVars:
      - key: VITE_API_URL
        value: https://duanbanhang-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: duanbanhang-db
    plan: free
    region: singapore
